# Evaluation Configuration

# Test runner settings
runner:
  timeout: 30  # seconds per test
  retries: 2

# Test categories
categories:
  - name: workspace_validation
    description: Tests for workspace and knowledge base validation
    tests:
      - test_valid_tilelang_repo
      - test_bundled_knowledge_fallback
      - test_not_tilelang_repo

  - name: device_normalization
    description: Tests for device profile normalization
    tests:
      - test_nvidia_h100
      - test_amd_mi300x
      - test_unknown_device

  - name: search
    description: Tests for capability, pattern, and API search
    tests:
      - test_gemm_capability_search
      - test_pattern_capability_filter
      - test_pattern_category_filter
      - test_api_lookup

  - name: new_tools
    description: Tests for troubleshooting, code validation, and wizard tools
    tests:
      - test_troubleshooting_search
      - test_troubleshooting_by_category
      - test_code_validation_valid
      - test_code_validation_empty
      - test_code_validation_syntax_error
      - test_wizard_step_1
      - test_wizard_with_intent

  - name: dual_workspace
    description: Tests for dual-workspace mode
    tests:
      - test_workspace_returns_new_fields
      - test_knowledge_base_returns_new_fields
      - test_tool_definitions_include_tilelang_source_path

  - name: auto_detection
    description: Tests for smart auto-detection
    tests:
      - test_auto_detect_returns_candidates
      - test_multiple_candidates_reported
      - test_hint_when_no_tilelang_found

  - name: end_to_end
    description: Full workflow tests
    tests:
      - test_basic_gemm_workflow
      - test_failure_recovery

# Expected behaviors
behaviors:
  hard_stop:
    description: "Skill must stop immediately on validation failure"
    conditions:
      - workspace_not_tilelang
      - no_workspace_local_or_bundled_knowledge
      - parse_error
      - missing_required_files

  conservative_device:
    description: "Skill must be conservative with hardware-specific features"
    features:
      - wgmma
      - tcgen05
      - tma
      - cp_async
      - mfma
      - lds
      - tmem
      - cluster_dims
      - is_cpu

  retrieval_trace:
    description: "Skill must output retrieval trace before code generation"
    required_fields:
      - workspace_status
      - device_profile
      - capability_id
      - pattern_id
      - usage_id
      - api_symbols
      - confidence
